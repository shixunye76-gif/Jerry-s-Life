<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Jerry Ye</title>

<style>
body{
  background:black;
  color:white;
  font-family:Helvetica,Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  text-align:center;
}

.container{
  max-width:700px;
  padding:40px;
  opacity:0;
  animation:fadein 3s forwards;
}

h1{
  font-size:42px;
  margin-bottom:20px;
  letter-spacing:2px;
}

.quote{
  font-size:22px;
  font-style:italic;
  line-height:1.6;
  opacity:0.9;
}

.footer{
  margin-top:60px;
  font-size:14px;
  opacity:0.4;
}

@keyframes fadein{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}
</style>
</head>

<body>

<div class="container">
  <h1>Jerry Ye</h1>

  <div class="quote">
    If you found this page,<br>
    you have discovered a trace of my existence.
  </div>

  <div class="footer">
    Earth · <span id="year"></span>
  </div>
</div>

<script>
  document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
